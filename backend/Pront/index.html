<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>My Book Service</title>
    <style>
      body {
        font-family: Arial;
        margin: 40px;
        background: #f5f5f5;
      }

      h1 {
        text-align: center;
      }

      .container {
        max-width: 800px;
        margin: auto;
      }

      .book {
        background: white;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      button {
        padding: 8px 12px;
        border: none;
        background: #007bff;
        color: white;
        border-radius: 5px;
        cursor: pointer;
      }

      select {
        margin-right: 10px;
      }

      .orders {
        margin-top: 40px;
        background: white;
        padding: 20px;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <h1>📚 나만의 책 만들기 서비스</h1>

    <div class="container">
      <h2>📖 책 목록</h2>
      <div id="bookList"></div>

      <div class="orders">
        <h2>🧾 주문 목록</h2>
        <button onclick="loadOrders()">불러오기</button>
        <ul id="orderList"></ul>
      </div>
    </div>

    <script>
      // 책 목록 불러오기
      async function loadBooks() {
        const res = await fetch("/api/books");
        const books = await res.json();

        const container = document.getElementById("bookList");
        container.innerHTML = "";

        books.forEach((book) => {
          const div = document.createElement("div");
          div.className = "book";

          div.innerHTML = `
          <div>
            <strong>${book.title}</strong><br/>
            💰 ${book.price}원
          </div>
          <div>
            <select id="cover-${book.id}">
              <option value="soft">소프트커버</option>
              <option value="hard">하드커버 (+5000)</option>
            </select>

            <select id="page-${book.id}">
              <option value="10">10페이지</option>
              <option value="20">20페이지</option>
              <option value="30">30페이지</option>
            </select>

            <button onclick="orderBook(${book.id})">주문</button>
          </div>
        `;

          container.appendChild(div);
        });
      }

      // 주문하기
      async function orderBook(bookId) {
        const cover = document.getElementById(`cover-${bookId}`).value;
        const page = document.getElementById(`page-${bookId}`).value;

        const res = await fetch("/api/order", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            book_id: bookId,
            options: [
              { name: "cover", value: cover },
              { name: "page", value: page },
            ],
          }),
        });

        const data = await res.json();

        alert(`✅ 주문 완료!\n가격: ${data.total_price}원`);
      }

      // 주문 목록 조회
      async function loadOrders() {
        const res = await fetch("/api/orders");
        const orders = await res.json();

        const list = document.getElementById("orderList");
        list.innerHTML = "";

        orders.forEach((order) => {
          const li = document.createElement("li");
          li.textContent = `주문ID: ${order.id} / 가격: ${order.total_price}`;
          list.appendChild(li);
        });
      }

      // 최초 실행
      loadBooks();
    </script>
  </body>
</html>
